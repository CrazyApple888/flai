# GitHub Actions Workflow created for handling the release process based on the draft release prepared with the Build workflow.
# Running the publishPlugin task requires all the following secrets to be provided: PUBLISH_TOKEN, PRIVATE_KEY, PRIVATE_KEY_PASSWORD, CERTIFICATE_CHAIN.
# See https://plugins.jetbrains.com/docs/intellij/plugin-signing.html for more information.

name: Release
on:
  release:
    types: [ prereleased, released ]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build, upload and publish
        required: true

jobs:

  # Detect which parts changed since the previous release tag
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.diff.outputs.plugin }}
      cli: ${{ steps.diff.outputs.cli }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Diff Against Previous Release Tag
        id: diff
        run: |
          PREV=$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "No previous release tag found; building everything"
            echo "plugin=true" >> "$GITHUB_OUTPUT"
            echo "cli=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Comparing $PREV..$RELEASE_TAG"
          CHANGED=$(git diff --name-only "$PREV" "$RELEASE_TAG")
          echo "$CHANGED"
          PLUGIN=false
          CLI=false
          if echo "$CHANGED" | grep -qE '^(src/|core/|build\.gradle\.kts|gradle\.properties|settings\.gradle\.kts|gradle/)'; then
            PLUGIN=true
          fi
          if echo "$CHANGED" | grep -qE '^(cli/|core/|build\.gradle\.kts|gradle\.properties|settings\.gradle\.kts|gradle/)'; then
            CLI=true
          fi
          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "cli=$CLI" >> "$GITHUB_OUTPUT"

  # Prepare and publish the plugin to JetBrains Marketplace repository
  release:
    name: Publish Plugin
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.plugin == 'true' && github.actor == github.repository_owner }}
    permissions:
      contents: write
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      # Update the Unreleased section with the current release note
      - name: Patch Changelog
        if: ${{ github.event.release.body != '' }}
        env:
          CHANGELOG: ${{ github.event.release.body }}
        run: |
          RELEASE_NOTE="./build/tmp/release_note.txt"
          mkdir -p "$(dirname "$RELEASE_NOTE")"
          echo "$CHANGELOG" > $RELEASE_NOTE

          ./gradlew patchChangelog --release-note-file=$RELEASE_NOTE

      # Build the plugin
      - name: Build Plugin
        run: ./gradlew buildPlugin

      # Upload the plugin ZIP as a release asset
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ env.RELEASE_TAG }} ./build/distributions/*.zip --clobber

      # Publish the plugin to JetBrains Marketplace
      - name: Publish Plugin
        if: ${{ env.PUBLISH_TOKEN != '' }}
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin

  # Build and attach the CLI fat JAR to the GitHub release
  release-cli:
    name: Publish CLI
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.cli == 'true' && github.actor == github.repository_owner }}
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      - name: Build CLI
        run: ./gradlew :cli:fatJar

      - name: Upload CLI Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ env.RELEASE_TAG }} ./cli/build/libs/flai-cli-*.jar --clobber
